<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניטור מכרזי רשות מקרקעי ישראל</title>
    <meta name="description" content="לוח בקרה אינטראקטיבי לניטור, חיפוש וניתוח של מכרזי רשות מקרקעי ישראל (רמ״י).">
    
    <!-- גוגל פונטס - Rubik (פונט מודרני לעברית) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons (אייקונים נקיים) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- jQuery ו-DataTables CSS/JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        /* ── Design System ────────────────────────────── */
        :root {
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #020617;
            --card-bg: rgba(30, 41, 59, 0.55);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --primary-accent: #06b6d4;
            --primary-accent-dim: rgba(6, 182, 212, 0.15);
            --secondary-accent: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --table-header-bg: rgba(30, 41, 59, 0.8);
            --table-row-hover: rgba(255, 255, 255, 0.04);
            --table-row-border: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-border-focus: #06b6d4;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-sans: 'Rubik', system-ui, -apple-system, sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --bg-gradient-start: #f0f4f8;
            --bg-gradient-end: #d9e2ec;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(0, 0, 0, 0.06);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --primary-accent: #0891b2;
            --primary-accent-dim: rgba(8, 145, 178, 0.1);
            --table-header-bg: rgba(226, 232, 240, 0.8);
            --table-row-hover: rgba(0, 0, 0, 0.03);
            --table-row-border: rgba(0, 0, 0, 0.06);
            --input-bg: rgba(255, 255, 255, 0.85);
            --input-border: rgba(0, 0, 0, 0.12);
            --input-border-focus: #0891b2;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glow-sphere {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }
        .glow-1 { top: -200px; left: -200px; }
        .glow-2 { bottom: -200px; right: -200px; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.25rem;
        }

        .header-title h1 {
            font-size: 2.25rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(to left, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
            line-height: 1.2;
        }

        .header-title p {
            color: var(--text-secondary);
            font-size: 0.925rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .last-updated {
            color: var(--text-tertiary);
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            background: rgba(148, 163, 184, 0.08);
            border-radius: 50px;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 0.65rem 1.25rem;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(8px);
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--primary-accent);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        /* ── Stats Cards ──────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all var(--transition);
        }

        .stat-card:hover {
            box-shadow: var(--shadow);
            border-color: rgba(6, 182, 212, 0.2);
            transform: translateY(-1px);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-accent), var(--secondary-accent));
            border-radius: 0 3px 3px 0;
        }

        .stat-info h3 {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.35rem;
            letter-spacing: 0.01em;
        }

        .stat-info p {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .stat-icon {
            background: var(--primary-accent-dim);
            color: var(--primary-accent);
            padding: 0.7rem;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ── Filters Panel ────────────────────────── */
        .filters-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(12px);
            transition: all var(--transition);
        }

        .filters-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-primary);
        }

        .filters-title i {
            color: var(--primary-accent);
            flex-shrink: 0;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-control {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-control label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .filter-control select,
        .filter-control input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 0.6rem 0.9rem;
            border-radius: var(--radius-sm);
            outline: none;
            width: 100%;
            font-size: 0.9rem;
            font-family: var(--font-sans);
            transition: border-color var(--transition), box-shadow var(--transition);
            appearance: auto;
        }

        .filter-control select:hover,
        .filter-control input:hover {
            border-color: var(--text-tertiary);
        }

        .filter-control select:focus,
        .filter-control input:focus {
            border-color: var(--input-border-focus);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .filter-control select option {
            background: #1e293b;
            color: #f1f5f9;
        }

        body.light-mode .filter-control select option {
            background: #ffffff;
            color: #0f172a;
        }

        .filter-control input[type="number"]::-webkit-inner-spin-button {
            opacity: 0.5;
        }

        .filter-control input::placeholder {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }

        /* ── Table ────────────────────────────────── */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(12px);
            overflow-x: auto;
            transition: all var(--transition);
        }

        table.dataTable {
            border-collapse: collapse !important;
            width: 100% !important;
            color: var(--text-primary) !important;
            margin-top: 0.25rem !important;
        }

        table.dataTable thead th {
            background-color: var(--table-header-bg) !important;
            color: var(--text-primary) !important;
            font-weight: 600 !important;
            padding: 0.85rem 2rem 0.85rem 1rem !important;
            border-bottom: 1px solid var(--table-row-border) !important;
            text-align: right !important;
            font-size: 0.85rem !important;
            letter-spacing: 0.02em;
            white-space: nowrap;
            position: relative;
        }

        table.dataTable thead th.sorting:after,
        table.dataTable thead th.sorting_asc:after,
        table.dataTable thead th.sorting_desc:after {
            opacity: 0.6 !important;
            right: 8px !important;
            left: auto !important;
        }

        table.dataTable tbody tr {
            background-color: transparent !important;
            border-bottom: 1px solid var(--table-row-border) !important;
        }

        table.dataTable tbody tr:hover {
            background-color: var(--table-row-hover) !important;
        }

        table.dataTable tbody td {
            padding: 0.85rem 1rem !important;
            vertical-align: middle !important;
            font-size: 0.9rem;
        }


        /* ── Tabs ─────────────────────────────────── */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            padding: 0.65rem 1.25rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }

        .tab-btn:hover {
            border-color: var(--primary-accent);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary-accent-dim), rgba(139, 92, 246, 0.12));
            border-color: var(--primary-accent);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.08);
        }

        .tab-btn i {
            transition: transform var(--transition);
        }

        .tab-btn.active i {
            transform: scale(1.1);
        }

        .tab-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 0.75rem;
        }

        .tab-indicator span:first-child {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .tab-count {
            color: var(--text-secondary);
            font-size: 0.85rem;
            background: rgba(148, 163, 184, 0.1);
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
        }

        /* ── DataTables Wrapper ───────────────────── */
        .dataTables_wrapper .dataTables_filter {
            margin-bottom: 0.75rem;
            float: left !important;
            clear: none !important;
        }
        .dataTables_wrapper .dataTables_filter label {
            color: var(--text-secondary) !important;
            font-size: 0.85rem !important;
        }
        .dataTables_wrapper .dataTables_filter input {
            background: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-primary) !important;
            padding: 0.5rem 0.85rem !important;
            border-radius: var(--radius-sm) !important;
            margin-right: 0.4rem !important;
            outline: none !important;
            font-size: 0.85rem !important;
            font-family: var(--font-sans) !important;
            width: 220px !important;
            transition: border-color var(--transition), box-shadow var(--transition) !important;
        }
        .dataTables_wrapper .dataTables_filter input:focus {
            border-color: var(--input-border-focus) !important;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12) !important;
        }

        .dataTables_wrapper .dataTables_length {
            margin-bottom: 0.75rem;
            float: right !important;
        }
        .dataTables_wrapper .dataTables_length label {
            color: var(--text-secondary) !important;
            font-size: 0.85rem !important;
        }
        .dataTables_wrapper .dataTables_length select {
            background: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-primary) !important;
            padding: 0.35rem 0.6rem !important;
            border-radius: var(--radius-sm) !important;
            outline: none !important;
            font-size: 0.85rem !important;
            font-family: var(--font-sans) !important;
            margin: 0 0.3rem !important;
            transition: border-color var(--transition) !important;
        }
        .dataTables_wrapper .dataTables_length select:focus {
            border-color: var(--input-border-focus) !important;
        }

        .dataTables_wrapper .dataTables_info {
            color: var(--text-tertiary) !important;
            font-size: 0.85rem !important;
            padding-top: 1rem !important;
        }

        .dataTables_wrapper .dataTables_paginate {
            padding-top: 1rem !important;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: var(--text-primary) !important;
            border: 1px solid var(--card-border) !important;
            background: transparent !important;
            border-radius: var(--radius-sm) !important;
            padding: 0.35rem 0.7rem !important;
            margin: 0 1px !important;
            font-size: 0.85rem !important;
            transition: all var(--transition) !important;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.current,
        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: linear-gradient(to left, var(--primary-accent), var(--secondary-accent)) !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.2) !important;
        }
        .dataTables_wrapper .dataTables_paginate .paginate_button.disabled {
            opacity: 0.3 !important;
            cursor: default !important;
        }

        /* ── Badges ───────────────────────────────── */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.01em;
            line-height: 1.4;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
        body.light-mode .badge-active {
            color: #059669;
        }

        .badge-published {
            background: rgba(59, 130, 246, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        body.light-mode .badge-published {
            color: #2563eb;
        }

        .badge-closed {
            background: rgba(148, 163, 184, 0.12);
            color: var(--text-secondary);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .badge-canceled {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }
        body.light-mode .badge-canceled {
            color: #dc2626;
        }

        .badge-committee {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.25);
        }
        body.light-mode .badge-committee {
            color: #d97706;
        }

        /* ── Links ────────────────────────────────── */
        .tender-link {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color var(--transition);
        }

        .tender-link:hover {
            color: var(--secondary-accent);
        }

        /* ── Action Buttons ───────────────────────── */
        .btn-less-relevant,
        .btn-restore {
            padding: 0.35rem 0.7rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.78rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }

        .btn-less-relevant {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.25);
        }
        body.light-mode .btn-less-relevant {
            color: #d97706;
        }
        .btn-less-relevant:hover {
            background: rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.4);
            transform: translateY(-1px);
        }

        .btn-restore {
            background: rgba(16, 185, 129, 0.12);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
        body.light-mode .btn-restore {
            color: #059669;
        }
        .btn-restore:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            transform: translateY(-1px);
        }

        .btn-less-relevant:disabled,
        .btn-restore:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .action-cell {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ── Notes Textarea ───────────────────────── */
        .notes-textarea {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            padding: 0.35rem 0.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.78rem;
            width: 160px;
            min-height: 40px;
            max-height: 80px;
            resize: vertical;
            outline: none;
            font-family: var(--font-sans);
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .notes-textarea:focus {
            border-color: var(--input-border-focus);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        .notes-textarea::placeholder {
            color: var(--text-tertiary);
        }

        /* ── Table Loader ─────────────────────────── */
        .table-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            gap: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .table-loader.hidden {
            display: none;
        }
        .loader-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--card-border);
            border-top-color: var(--primary-accent);
            border-radius: 50%;
            animation: loader-spin 0.7s linear infinite;
        }
        @keyframes loader-spin {
            to { transform: rotate(360deg); }
        }

        /* ── Spinner ──────────────────────────────── */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin {
            animation: spin 0.6s linear infinite;
        }

        /* ── Responsive ───────────────────────────── */
        @media (max-width: 900px) {
            .filters-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .dataTables_wrapper .dataTables_filter input {
                width: 160px !important;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0.75rem;
            }
            .header-title h1 {
                font-size: 1.5rem;
            }
            .header-title p {
                font-size: 0.85rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
            .stat-card {
                padding: 1.1rem;
            }
            .stat-info p {
                font-size: 1.4rem;
            }
            .filters-panel {
                padding: 1rem;
            }
            .filters-grid {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
            .tabs-container {
                gap: 0.4rem;
            }
            .tab-btn {
                padding: 0.5rem 0.9rem;
                font-size: 0.8rem;
            }
            .table-container {
                padding: 0.75rem;
            }
            table.dataTable tbody td,
            table.dataTable thead th {
                padding: 0.5rem 0.6rem !important;
                font-size: 0.8rem !important;
            }
            .notes-textarea {
                width: 120px;
                min-height: 32px;
            }
            .dataTables_wrapper .dataTables_filter input {
                width: 130px !important;
            }
        }
    </style>
</head>
<body>
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>

    <div class="container">
        <!-- כותרת ראשית -->
        <header>
            <div class="header-title">
                <h1>מערכת ניטור מכרזי רמ"י</h1>
                <p><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i> עדכון נתונים אוטומטי (רשות מקרקעי ישראל) <span id="lastUpdated" class="last-updated"></span></p>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">
                <i data-lucide="sun" id="themeIcon"></i>
                <span id="themeText">מצב בהיר</span>
            </button>
        </header>

        <!-- ריבוע סטטיסטיקות -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>סה"כ מכרזים במאגר</h3>
                    <p id="statTotal">-</p>
                </div>
                <div class="stat-icon">
                    <i data-lucide="database"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>מכרזים פעילים כעת</h3>
                    <p id="statActive">-</p>
                </div>
                <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">
                    <i data-lucide="activity"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>יישובים מנוטרים</h3>
                    <p id="statCities">-</p>
                </div>
                <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--secondary-accent);">
                    <i data-lucide="map-pin"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>מחיר מינימום ממוצע</h3>
                    <p id="statAvgPrice">-</p>
                </div>
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);">
                    <i data-lucide="coins"></i>
                </div>
            </div>
        </div>

        <!-- פאנל סינונים מתקדם -->
        <div class="filters-panel">
            <div class="filters-title">
                <i data-lucide="sliders-horizontal" style="color: var(--primary-accent);"></i>
                <span>סינון וחיפוש מתקדם</span>
            </div>
            <div class="filters-grid">
                <div class="filter-control">
                    <label for="filterCity">יישוב / עיר</label>
                    <select id="filterCity">
                        <option value="">הכל</option>
                    </select>
                </div>
                <div class="filter-control">
                    <label for="filterStatus">סטטוס מכרז</label>
                    <select id="filterStatus">
                        <option value="">הכל</option>
                    </select>
                </div>
                <div class="filter-control">
                    <label for="filterMinPrice">מחיר מינימום מ- (₪)</label>
                    <input type="number" id="filterMinPrice" placeholder="ללא הגבלה">
                </div>
                <div class="filter-control">
                    <label for="filterMaxPrice">מחיר מקסימום עד (₪)</label>
                    <input type="number" id="filterMaxPrice" placeholder="ללא הגבלה">
                </div>
            </div>
        </div>

        <!-- טאבים -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="active">
                <i data-lucide="activity" style="width: 18px; height: 18px;"></i>
                מכרזים פעילים
            </button>
            <button class="tab-btn" data-tab="less-relevant">
                <i data-lucide="bookmark-minus" style="width: 18px; height: 18px;"></i>
                פחות רלוונטי
            </button>
            <button class="tab-btn" data-tab="historical">
                <i data-lucide="archive" style="width: 18px; height: 18px;"></i>
                תוצאות מכרזים
            </button>
        </div>

        <!-- טבלת נתונים ראשית -->
        <div class="table-container">
            <div class="tab-indicator">
                <span id="tabCount" class="tab-count">0 מכרזים</span>
                <span id="tabLabel">מכרזים פעילים</span>
            </div>
            <div id="tableLoader" class="table-loader">
                <div class="loader-spinner"></div>
                <span>טוען נתונים...</span>
            </div>
            <table id="tendersTable" class="display responsive nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>מזהה מכרז</th>
                        <th>קוד מכרז</th>
                        <th>יישוב</th>
                        <th>שכונה / רחוב</th>
                        <th>מחיר סף (₪)</th>
                        <th>תאריך פרסום</th>
                        <th>סטטוס</th>
                        <th>הערות</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- נתונים יוזנו דינמית -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            let table = null;
            let allData = [];
            let currentTab = 'active';
            let lessRelevant = [];
            let tenderNotes = {};

            lucide.createIcons();

            /* ---- localStorage persistence ---- */
            function loadLessRelevant() {
                try {
                    const data = localStorage.getItem('lessRelevant');
                    lessRelevant = data ? JSON.parse(data) : [];
                } catch(e) { lessRelevant = []; }
            }
            function saveLessRelevant() {
                localStorage.setItem('lessRelevant', JSON.stringify(lessRelevant));
            }
            function loadNotes() {
                try {
                    const data = localStorage.getItem('tenderNotes');
                    tenderNotes = data ? JSON.parse(data) : {};
                } catch(e) { tenderNotes = {}; }
            }
            function saveNotes() {
                localStorage.setItem('tenderNotes', JSON.stringify(tenderNotes));
            }
            loadLessRelevant();
            loadNotes();

            /* ---- theme ---- */
            const themeBtn = document.getElementById('themeToggleBtn');
            themeBtn.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                const isLight = document.body.classList.contains('light-mode');
                document.getElementById('themeText').innerText = isLight ? 'מצב כהה' : 'מצב בהיר';
                document.getElementById('themeIcon').setAttribute('data-lucide', isLight ? 'moon' : 'sun');
                lucide.createIcons();
            });

            /* ---- helpers ---- */
            function formatCurrency(val) {
                if (val === null || val === undefined) return '-';
                return new Intl.NumberFormat('he-IL', { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 }).format(val);
            }

            function getStatusBadge(statusText, statusCode) {
                let badgeClass = 'badge-closed';
                if (statusCode === 1) badgeClass = 'badge-published';
                if (statusCode === 2) badgeClass = 'badge-active';
                if (statusCode === 7) badgeClass = 'badge-canceled';
                if (statusCode === 5) badgeClass = 'badge-committee';
                return `<span class="badge ${badgeClass}">${statusText}</span>`;
            }

            function getFileName(tab) {
                if (tab === 'active' || tab === 'less-relevant') return 'tenders_active.json';
                return 'tenders_results.json';
            }

            function getTabLabel(tab) {
                if (tab === 'active') return 'מכרזים פעילים';
                if (tab === 'less-relevant') return 'מכרזים פחות רלוונטיים';
                return 'תוצאות מכרזים';
            }

            function updateLastUpdated() {
                const el = document.getElementById('lastUpdated');
                if (!el) return;
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const hebrewMonths = ['ינו', 'פבר', 'מרץ', 'אפר', 'מאי', 'יונ', 'יול', 'אוג', 'ספט', 'אוק', 'נוב', 'דצמ'];
                const month = hebrewMonths[now.getMonth()];
                const year = now.getFullYear();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                el.innerHTML = `<i data-lucide="clock" style="width: 12px; height: 12px;"></i> עודכן לאחרונה: ${day} ב${month} ${year}, ${hours}:${minutes}`;
                lucide.createIcons();
            }

            /* ---- data loading & rendering ---- */
            function loadData(tab) {
                const fileName = getFileName(tab);
                const loader = document.getElementById('tableLoader');

                if (table) {
                    table.destroy();
                    table = null;
                }
                $('#tendersTable tbody').empty();
                $('#tendersTable').hide();
                if (loader) loader.classList.remove('hidden');
                $('#filterCity').empty().append('<option value="">הכל</option>');
                $('#filterStatus').empty().append('<option value="">הכל</option>');
                $('#filterMinPrice').val('');
                $('#filterMaxPrice').val('');
                $.fn.dataTable.ext.search = $.fn.dataTable.ext.search.filter(f => false);

                fetch(fileName)
                    .then(response => {
                        if (!response.ok) throw new Error('שגיאה בטעינת ' + fileName);
                        return response.json();
                    })
                    .then(data => {
                        allData = data;
                        let displayData = data;
                        if (tab === 'active') {
                            displayData = data.filter(t => !lessRelevant.includes(t.id));
                        } else if (tab === 'less-relevant') {
                            displayData = data.filter(t => lessRelevant.includes(t.id));
                        }
                        if (loader) loader.classList.add('hidden');
                        $('#tendersTable').show();
                        document.getElementById('tabLabel').innerText = getTabLabel(tab);
                        document.getElementById('tabCount').innerText = `${displayData.length} מכרזים`;
                        updateStatistics(displayData);
                        populateFilterOptions(displayData);
                        populateTable(data, tab);
                        updateLastUpdated();
                    })
                    .catch(error => {
                        console.error('שגיאה:', error);
                        if (loader) loader.classList.add('hidden');
                        $('#tendersTable').show();
                        document.getElementById('tabLabel').innerText = getTabLabel(tab);
                        document.getElementById('tabCount').innerText = 'שגיאה בטעינה';
                        document.getElementById('statTotal').innerText = '0';
                        document.getElementById('statActive').innerText = '0';
                        document.getElementById('statCities').innerText = '0';
                        document.getElementById('statAvgPrice').innerText = '-';
                        const tbody = $('#tendersTable tbody');
                        tbody.empty();
                        tbody.append(`<tr><td colspan="9" style="text-align:center; padding:2rem; color: var(--danger);">שגיאה בטעינת נתונים. יש להריץ את fetcher.py תחילה.</td></tr>`);
                    });
            }

            function updateStatistics(data) {
                const total = data.length;
                const active = data.filter(t => t.status_code === 1 || t.status_code === 2).length;
                const cities = new Set(data.map(t => t.city).filter(Boolean)).size;
                const prices = data.map(t => t.price).filter(p => p !== null && p !== undefined && p > 0);
                const avgPrice = prices.length > 0 ? prices.reduce((a, b) => a + b, 0) / prices.length : 0;

                document.getElementById('statTotal').innerText = total.toLocaleString();
                document.getElementById('statActive').innerText = active.toLocaleString();
                document.getElementById('statCities').innerText = cities.toLocaleString();
                document.getElementById('statAvgPrice').innerText = avgPrice > 0 ? formatCurrency(avgPrice) : '-';
            }

            function populateFilterOptions(data) {
                const cities = [...new Set(data.map(t => t.city).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'he'));
                const citySelect = document.getElementById('filterCity');
                cities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.innerText = c;
                    citySelect.appendChild(opt);
                });

                const statuses = [...new Set(data.map(t => t.status).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'he'));
                const statusSelect = document.getElementById('filterStatus');
                statuses.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.innerText = s;
                    statusSelect.appendChild(opt);
                });
            }

            function populateTable(data, tab) {
                const tbody = $('#tendersTable tbody');
                tbody.empty();

                const showExtras = tab === 'active' || tab === 'less-relevant';

                data.forEach(t => {
                    const noteText = tenderNotes[t.id] || '';
                    let actionsHtml = '';
                    let notesHtml = '';

                    if (tab === 'active') {
                        actionsHtml = `<button class="btn-less-relevant" data-id="${t.id}"><i data-lucide="bookmark-minus" style="width: 14px; height: 14px;"></i> פחות רלוונטי</button>`;
                    } else if (tab === 'less-relevant') {
                        actionsHtml = `<button class="btn-restore" data-id="${t.id}"><i data-lucide="rotate-ccw" style="width: 14px; height: 14px;"></i> שחזר</button>`;
                    }

                    if (showExtras) {
                        notesHtml = `<textarea class="notes-textarea" data-id="${t.id}" placeholder="הוסף הערה...">${noteText}</textarea>`;
                    }

                    const rowHtml = `
                        <tr>
                            <td>
                                <a href="https://apps.land.gov.il/MichrazimSite/#/michraz/${t.id}" target="_blank" class="tender-link">
                                    ${t.id}
                                    <i data-lucide="external-link" style="width: 12px; height: 12px;"></i>
                                </a>
                            </td>
                            <td>${t.description || '-'}</td>
                            <td><strong>${t.city || '-'}</strong></td>
                            <td>${t.shchuna || '-'}</td>
                            <td data-order="${t.price !== null ? t.price : -1}">${formatCurrency(t.price)}</td>
                            <td>${t.date || '-'}</td>
                            <td>${getStatusBadge(t.status, t.status_code)}</td>
                            ${showExtras ? `<td>${notesHtml}</td><td class="action-cell">${actionsHtml}</td>` : '<td></td><td></td>'}
                        </tr>
                    `;
                    tbody.append(rowHtml);
                });

                lucide.createIcons();

                $.fn.dataTable.ext.search.push(
                    function(settings, data, dataIndex) {
                        const rowObj = allData[dataIndex];
                        if (!rowObj) return true;
                        if (currentTab === 'active' && lessRelevant.includes(rowObj.id)) return false;
                        if (currentTab === 'less-relevant' && !lessRelevant.includes(rowObj.id)) return false;
                        const filterCity = $('#filterCity').val();
                        if (filterCity && rowObj.city !== filterCity) return false;
                        const filterStatus = $('#filterStatus').val();
                        if (filterStatus && rowObj.status !== filterStatus) return false;
                        const minPriceVal = parseFloat($('#filterMinPrice').val());
                        const maxPriceVal = parseFloat($('#filterMaxPrice').val());
                        const price = rowObj.price;
                        if (!isNaN(minPriceVal)) {
                            if (price === null || price < minPriceVal) return false;
                        }
                        if (!isNaN(maxPriceVal)) {
                            if (price === null || price > maxPriceVal) return false;
                        }
                        return true;
                    }
                );

                table = $('#tendersTable').DataTable({
                    language: {
                        url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/he.json'
                    },
                    order: [[0, 'desc']],
                    pageLength: 25,
                    lengthMenu: [10, 25, 50, 100],
                    responsive: true,
                    dom: '<"top"lf>rt<"bottom"ip><"clear">',
                    drawCallback: function() {
                        lucide.createIcons();
                        bindTableEvents();
                    }
                });

                $('#filterCity, #filterStatus, #filterMinPrice, #filterMaxPrice').on('change keyup', function() {
                    table.draw();
                });
            }

            /* ---- event binding for dynamic buttons / notes ---- */
            function bindTableEvents() {
                $('.btn-less-relevant').off('click').on('click', function() {
                    const id = parseInt($(this).data('id'));
                    if (!lessRelevant.includes(id)) {
                        lessRelevant.push(id);
                        saveLessRelevant();
                        const btn = $(this);
                        btn.html('<i data-lucide="loader" style="width: 14px; height: 14px;" class="spin"></i>').prop('disabled', true);
                        lucide.createIcons();
                        setTimeout(() => {
                            table.draw();
                            const displayData = allData.filter(t => !lessRelevant.includes(t.id));
                            document.getElementById('tabCount').innerText = `${displayData.length} מכרזים`;
                            updateStatistics(displayData);
                        }, 350);
                    }
                });

                $('.btn-restore').off('click').on('click', function() {
                    const id = parseInt($(this).data('id'));
                    lessRelevant = lessRelevant.filter(i => i !== id);
                    saveLessRelevant();
                    const btn = $(this);
                    btn.html('<i data-lucide="loader" style="width: 14px; height: 14px;" class="spin"></i>').prop('disabled', true);
                    lucide.createIcons();
                    setTimeout(() => {
                        table.draw();
                        const displayData = currentTab === 'less-relevant'
                            ? allData.filter(t => lessRelevant.includes(t.id))
                            : allData;
                        document.getElementById('tabCount').innerText = `${displayData.length} מכרזים`;
                        updateStatistics(displayData);
                    }, 350);
                });

                $('.notes-textarea').off('blur').on('blur', function() {
                    const id = parseInt($(this).data('id'));
                    const val = $(this).val();
                    tenderNotes[id] = val;
                    saveNotes();
                });
            }

            /* ---- tab switching ---- */
            $('.tab-btn').on('click', function() {
                const tab = $(this).data('tab');
                if (tab === currentTab) return;
                currentTab = tab;
                $('.tab-btn').removeClass('active');
                $(this).addClass('active');
                loadData(tab);
            });

            loadData('active');
        });
    </script>
</body>
</html>

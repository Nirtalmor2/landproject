name: ניטור מכרזי רמ"י אוטומטי

on:
  schedule:
    # הרצה יומית בשעה 06:00 בבוקר (UTC)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # מאפשר הרצה ידנית מתוך ממשק ה-GitHub

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-tenders:
    runs-on: ubuntu-latest

    steps:
      # 1. משיכת הקוד מהמאגר
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. התקנת סביבת Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. התקנת ספריות דרושות
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. הרצת סקריפט האיסוף
      - name: Run fetcher script
        run: python fetcher.py

      # 5. בדיקת שינויים והתחייבות (Commit & Push) של הנתונים המעודכנים
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tenders.json
          # דחיפה רק אם יש שינויים בפועל בקובץ הנתונים
          if ! git diff --cached --quiet; then
            git commit -m "עדכון נתוני מכרזים אוטומטי [skip ci]"
            git push
          else
            echo "לא נמצאו שינויים חדשים בנתוני המכרזים."
          fi

      # 6. העלאת קבצי האתר ל-GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # 7. פריסת האתר ב-GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
